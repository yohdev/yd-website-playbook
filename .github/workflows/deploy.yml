name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'client-*'
      - 'daly'
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check for client deliverables
        id: check_deliverables
        run: |
          if [ -d "output" ] && [ -f "output/Homepage.html" ]; then
            echo "has_deliverables=true" >> $GITHUB_OUTPUT
            echo "Found client deliverables in output/"
          else
            echo "has_deliverables=false" >> $GITHUB_OUTPUT
            echo "No client deliverables found, will deploy reference only"
          fi

      - name: Build site
        run: |
          mkdir -p dist

          if [ "${{ steps.check_deliverables.outputs.has_deliverables }}" == "true" ]; then
            echo "Building with client deliverables..."
            cp -r output/* dist/
            [ -d "assets" ] && cp -r assets dist/
          else
            echo "Building with reference implementation..."
            cp .claude/skills/yohdev-website-refresh/reference/Homepage.html dist/index.html
            cp .claude/skills/yohdev-website-refresh/reference/Style-Guide.html dist/style-guide.html
            cp .claude/skills/yohdev-website-refresh/reference/Playbook.html dist/playbook.html
            [ -d "uploads" ] && cp -r uploads dist/
          fi

          mkdir -p dist/docs
          cp README.md dist/docs/
          [ -d ".claude/skills/yohdev-website-refresh/reference" ] && cp -r .claude/skills/yohdev-website-refresh/reference dist/docs/reference

          if [ ! -f "dist/index.html" ]; then
            cat > dist/index.html << 'FALLBACK'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>YohDev Website Refresh</title>
            <style>
              body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 2rem; }
              h1 { color: #0ea5e9; }
              .links { display: flex; gap: 1rem; margin-top: 2rem; }
              a { color: #0ea5e9; text-decoration: none; padding: 0.5rem 1rem; border: 2px solid #0ea5e9; border-radius: 0.25rem; }
              a:hover { background: #0ea5e9; color: white; }
            </style>
          </head>
          <body>
            <h1>YohDev Website Refresh</h1>
            <p>AI-Assisted Website Playbook Generator</p>
            <div class="links">
              <a href="style-guide.html">Style Guide</a>
              <a href="playbook.html">Playbook</a>
              <a href="docs/">Documentation</a>
            </div>
          </body>
          </html>
          FALLBACK
          fi

          touch dist/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: ./dist
          retention-days: 1

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
        continue-on-error: true
        id: checkout_ghpages

      - name: Initialize gh-pages branch if missing
        if: steps.checkout_ghpages.outcome == 'failure'
        run: |
          git checkout --orphan gh-pages
          git rm -rf . || true
          touch .nojekyll
          git add .nojekyll
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Initialize gh-pages branch"
          git push origin gh-pages

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./incoming

      - name: Deploy to root (preserve branches/)
        run: |
          # Remove all root-level files but keep branches/ directory and incoming/
          find . -maxdepth 1 -not -name '.' -not -name '.git' -not -name 'branches' -not -name 'incoming' -exec rm -rf {} +

          # Copy new build to root
          cp -r incoming/* .
          rm -rf incoming

          # Ensure .nojekyll exists
          touch .nojekyll

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy main to root"
          git push origin gh-pages

  deploy-branch:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
        continue-on-error: true
        id: checkout_ghpages

      - name: Initialize gh-pages branch if missing
        if: steps.checkout_ghpages.outcome == 'failure'
        run: |
          git checkout --orphan gh-pages
          git rm -rf . || true
          touch .nojekyll
          git add .nojekyll
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "Initialize gh-pages branch"
          git push origin gh-pages

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./incoming

      - name: Deploy to branch subdirectory
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"

          # Clean and recreate branch directory
          rm -rf "branches/${BRANCH_NAME}"
          mkdir -p "branches/${BRANCH_NAME}"

          # Copy new build
          cp -r incoming/* "branches/${BRANCH_NAME}/"
          rm -rf incoming

      - name: Commit and push
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy branch ${BRANCH_NAME}"
          git push origin gh-pages

  comment-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const previewUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/branches/${branchName}/`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;
            const actor = '${{ github.actor }}';

            const body = [
              `**Preview Ready**`,
              ``,
              `${previewUrl}`,
              ``,
              `Branch: \`${branchName}\``,
              `Built by: @${actor} | [Workflow run](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Get branch name
        id: branch
        run: echo "name=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
        continue-on-error: true
        id: checkout_ghpages

      - name: Remove branch preview
        if: steps.checkout_ghpages.outcome == 'success'
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.name }}"
          if [ -d "branches/${BRANCH_NAME}" ]; then
            rm -rf "branches/${BRANCH_NAME}"
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git diff --staged --quiet && echo "No preview to clean up" && exit 0
            git commit -m "Cleanup preview for branch ${BRANCH_NAME}"
            git push origin gh-pages
            echo "cleaned=true" >> $GITHUB_OUTPUT
          else
            echo "No preview found for branch ${BRANCH_NAME}"
            echo "cleaned=false" >> $GITHUB_OUTPUT
          fi
        id: cleanup

      - name: Comment PR confirming cleanup
        if: steps.cleanup.outputs.cleaned == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = '${{ steps.branch.outputs.name }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Preview for \`${branchName}\` has been removed.`,
            });

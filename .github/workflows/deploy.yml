name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check for client deliverables
        id: check_deliverables
        run: |
          if [ -d "output" ] && [ -f "output/Homepage.html" ]; then
            echo "has_deliverables=true" >> $GITHUB_OUTPUT
            echo "Found client deliverables in output/"
          else
            echo "has_deliverables=false" >> $GITHUB_OUTPUT
            echo "No client deliverables found, will deploy reference only"
          fi

      - name: Build site
        run: |
          # Create dist directory
          mkdir -p dist
          
          # If we have client deliverables, use those
          if [ "${{ steps.check_deliverables.outputs.has_deliverables }}" == "true" ]; then
            echo "Building with client deliverables..."
            cp -r output/* dist/
            # Copy any assets
            [ -d "assets" ] && cp -r assets dist/
          else
            echo "Building with reference implementation..."
            # Copy reference files from skill directory
            cp .claude/skills/yohdev-website-refresh/reference/Homepage.html dist/index.html
            cp .claude/skills/yohdev-website-refresh/reference/Style-Guide.html dist/style-guide.html
            cp .claude/skills/yohdev-website-refresh/reference/Playbook.html dist/playbook.html
            # Copy uploads if they exist
            [ -d "uploads" ] && cp -r uploads dist/
          fi
          
          # Copy skill documentation
          mkdir -p dist/docs
          cp README.md dist/docs/
          cp -r .claude/skills/yohdev-website-refresh/reference dist/docs/reference
          
          # Ensure we have an index.html (should already be set from above)
          if [ ! -f "dist/index.html" ]; then
            echo "Warning: No index.html found after build"
          fi
          
          # Create a simple landing page if no index exists
          if [ ! -f "dist/index.html" ]; then
            cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>YohDev Website Refresh</title>
            <style>
              body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 2rem; }
              h1 { color: #0ea5e9; }
              .links { display: flex; gap: 1rem; margin-top: 2rem; }
              a { color: #0ea5e9; text-decoration: none; padding: 0.5rem 1rem; border: 2px solid #0ea5e9; border-radius: 0.25rem; }
              a:hover { background: #0ea5e9; color: white; }
            </style>
          </head>
          <body>
            <h1>YohDev Website Refresh</h1>
            <p>AI-Assisted Website Playbook Generator</p>
            <div class="links">
              <a href="style-guide.html">Style Guide</a>
              <a href="playbook.html">Playbook</a>
              <a href="docs/">Documentation</a>
            </div>
          </body>
          </html>
          EOF
          fi
          
          # Add .nojekyll to prevent Jekyll processing
          touch dist/.nojekyll

      - name: Upload artifact for GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Upload artifact for PR preview
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: ./dist

  deploy-main:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-build
          path: ./dist

      - name: Deploy to Surge
        id: surge
        run: |
          npm install -g surge
          # Generate unique preview URL using PR number
          PREVIEW_URL="yohdev-pr-${{ github.event.pull_request.number }}.surge.sh"
          surge ./dist $PREVIEW_URL --token ${{ secrets.SURGE_TOKEN }}
          echo "preview_url=https://$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const preview_url = '${{ steps.surge.outputs.preview_url }}';
            const body = `🚀 **Preview Deployment Ready!**
            
            Preview URL: ${preview_url}
            
            ---
            
            **Files in preview:**
            - Homepage: ${preview_url}
            - Style Guide: ${preview_url}/style-guide.html
            - Playbook: ${preview_url}/playbook.html
            - Documentation: ${preview_url}/docs/
            
            This preview will be automatically updated when you push new commits.`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment Ready')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
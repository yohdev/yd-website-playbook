name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'daly'
      - 'client-*'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check for client deliverables
        id: check_deliverables
        run: |
          if [ -d "output" ] && [ -f "output/Homepage.html" ]; then
            echo "has_deliverables=true" >> $GITHUB_OUTPUT
            echo "Found client deliverables in output/"
          else
            echo "has_deliverables=false" >> $GITHUB_OUTPUT
            echo "No client deliverables found, will deploy reference only"
          fi

      - name: Build site
        run: |
          # Create dist directory
          mkdir -p dist
          
          # If we have client deliverables, use those
          if [ "${{ steps.check_deliverables.outputs.has_deliverables }}" == "true" ]; then
            echo "Building with client deliverables..."
            cp -r output/* dist/
            # Copy any assets
            [ -d "assets" ] && cp -r assets dist/
          else
            echo "Building with reference implementation..."
            # Copy reference files from skill directory
            cp .claude/skills/yohdev-website-refresh/reference/Homepage.html dist/index.html
            cp .claude/skills/yohdev-website-refresh/reference/Style-Guide.html dist/style-guide.html
            cp .claude/skills/yohdev-website-refresh/reference/Playbook.html dist/playbook.html
            # Copy uploads if they exist
            [ -d "uploads" ] && cp -r uploads dist/
          fi
          
          # Copy skill documentation
          mkdir -p dist/docs
          cp README.md dist/docs/
          cp -r .claude/skills/yohdev-website-refresh/reference dist/docs/reference
          
          # Ensure we have an index.html (should already be set from above)
          if [ ! -f "dist/index.html" ]; then
            echo "Warning: No index.html found after build"
          fi
          
          # Create a simple landing page if no index exists
          if [ ! -f "dist/index.html" ]; then
            cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>YohDev Website Refresh</title>
            <style>
              body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 2rem; }
              h1 { color: #0ea5e9; }
              .links { display: flex; gap: 1rem; margin-top: 2rem; }
              a { color: #0ea5e9; text-decoration: none; padding: 0.5rem 1rem; border: 2px solid #0ea5e9; border-radius: 0.25rem; }
              a:hover { background: #0ea5e9; color: white; }
            </style>
          </head>
          <body>
            <h1>YohDev Website Refresh</h1>
            <p>AI-Assisted Website Playbook Generator</p>
            <div class="links">
              <a href="style-guide.html">Style Guide</a>
              <a href="playbook.html">Playbook</a>
              <a href="docs/">Documentation</a>
            </div>
          </body>
          </html>
          EOF
          fi
          
          # Add .nojekyll to prevent Jekyll processing
          touch dist/.nojekyll

      - name: Upload artifact for GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Upload artifact for PR preview and branch deployment
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/client-') || github.ref == 'refs/heads/daly'
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: ./dist

  deploy-main:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-branch:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/client-') || github.ref == 'refs/heads/daly')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-build
          path: ./dist
          
      - name: Get branch name
        id: branch
        run: echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        
      - name: Deploy to GitHub Pages branch subdirectory
        run: |
          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Clone or checkout gh-pages branch
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          
          # Create a temporary directory for gh-pages
          mkdir -p /tmp/gh-pages-deploy
          
          # If gh-pages exists, clone it; otherwise create new
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages-deploy gh-pages
          else
            git worktree add --detach /tmp/gh-pages-deploy
            cd /tmp/gh-pages-deploy
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            cd -
          fi
          
          # Create branch subdirectory and copy files
          mkdir -p /tmp/gh-pages-deploy/branches/${{ steps.branch.outputs.name }}
          cp -r dist/* /tmp/gh-pages-deploy/branches/${{ steps.branch.outputs.name }}/
          
          # Ensure .nojekyll exists at root
          touch /tmp/gh-pages-deploy/.nojekyll
          
          # Create index.html at root if it doesn't exist
          if [ ! -f /tmp/gh-pages-deploy/index.html ]; then
            cat > /tmp/gh-pages-deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>YohDev Website Playbook - Branch Previews</title>
            <style>
              body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 2rem; }
              h1 { color: #0ea5e9; }
              .branch { margin: 1rem 0; }
              a { color: #0ea5e9; }
            </style>
          </head>
          <body>
            <h1>YohDev Website Playbook</h1>
            <p>Branch preview deployments</p>
            <div class="branch">
              <a href="branches/${{ steps.branch.outputs.name }}/">→ ${{ steps.branch.outputs.name }} branch preview</a>
            </div>
          </body>
          </html>
          EOF
          fi
          
          # Commit and push
          cd /tmp/gh-pages-deploy
          git add .
          git commit -m "Deploy branch ${{ steps.branch.outputs.name }} - ${{ github.sha }}" || echo "No changes to commit"
          git push origin gh-pages
          
          # Clean up worktree
          cd -
          git worktree remove /tmp/gh-pages-deploy
          
      - name: Output deployment URL
        run: |
          echo "🚀 Branch deployed to: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/branches/${{ steps.branch.outputs.name }}/"

  comment-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with build status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runId = '${{ github.run_id }}';
            const actor = '${{ github.actor }}';
            const prNumber = '${{ github.event.pull_request.number }}';
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const artifactUrl = `${repoUrl}/actions/runs/${runId}`;
            
            // Get branch name from PR
            const branchName = context.payload.pull_request.head.ref;
            const isClientBranch = branchName === 'daly' || branchName.startsWith('client-');
            
            let body = `🔨 **Build Complete!**
            
            Your PR build has finished successfully. 
            `;
            
            // Add branch preview URL if this is a client branch
            if (isClientBranch) {
              body += `
            **🌐 Branch Preview URL:**
            https://${context.repo.owner}.github.io/${context.repo.repo}/branches/${branchName}/
            
            _Note: The preview will be deployed to GitHub Pages when you push to the \`${branchName}\` branch._
            `;
            }
            
            body += `
            **📦 Preview Artifacts:**
            - [Download build artifacts](${artifactUrl}) to test locally
            - Run \`npm run serve\` in the downloaded \`dist/\` folder
            
            **🚀 To deploy a preview:**
            1. Download the build artifact
            2. Test locally with \`npm run serve\`
            3. When ready, merge to main for production deployment
            
            **Production URL:** https://${context.repo.owner}.github.io/${context.repo.repo}/
            
            ---
            
            Built by @${actor} • [View workflow run](${artifactUrl})`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Build Complete!')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }